<!DOCTYPE html>
<html lang="vi">
<head>
   <meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
>

<meta name="theme-color" content="#d9f3ff">

<!-- Android / PWA -->
<link rel="manifest" href="./manifest.json">

<!-- iPhone / iPad -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
>
<meta name="apple-mobile-web-app-title" content="NCB Demo">

<link
    rel="apple-touch-icon"
    href="./img/app-icon.png"
>

    <link
        href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="./css/home.css">
</head>

<body>

<main class="home-page">

    <!-- Nền trang chủ -->
    <div class="home-background" aria-hidden="true">
        <span class="background-shape shape-one"></span>
        <span class="background-shape shape-two"></span>
        <span class="background-shape shape-three"></span>
    </div>


    <!-- Phần nội dung cuộn -->
    <div class="home-scroll">

        <!-- Header -->
        <header class="home-header">

            <h1>Trang chủ</h1>

            <div class="header-actions">

                <button
                    type="button"
                    class="notification-button"
                    aria-label="Thông báo"
                >
                    <i class="bx bx-bell"></i>
                </button>

                <button
                    type="button"
                    class="gift-button"
                >
                    <span>Quà tặng</span>
                    <i class="bx bx-gift"></i>
                </button>

            </div>

        </header>


        <!-- Số dư -->
        <section class="balance-section">

            <div class="balance-title-row">
                <span class="balance-title">
                    TỔNG SỐ DƯ
                </span>

                <button
                    type="button"
                    class="account-selector"
                >
                    <span>01</span>
                    <i class="bx bxs-right-arrow"></i>
                </button>
            </div>

            <div class="balance-value-row">

                <div
                    class="balance-value is-hidden"
                    id="balanceValue"
                    data-balance="25.680.000"
                >
                    *** *** VND
                </div>

                <button
                    type="button"
                    class="balance-eye"
                    id="toggleBalance"
                    aria-label="Hiện số dư"
                >
                    <i class="bx bx-hide"></i>
                </button>

            </div>

           <button
    type="button"
    class="transaction-history-button"
    id="transactionHistoryButton"
>
    <span>Lịch sử giao dịch</span>
    <i class="bx bx-receipt"></i>
</button>

            <div class="balance-dots" aria-hidden="true">
                <span class="active"></span>
                <span></span>
                <span></span>
            </div>

        </section>


        <!-- Tính năng nhanh -->
        <section class="quick-feature-section">

            <div class="quick-feature-grid">

                <button type="button" class="quick-feature-card">
                    <span class="feature-badge">NEW</span>

                    <span class="feature-icon sun-icon">
                        <i class="bx bx-sun"></i>
                    </span>

                    <span class="feature-name">
                        Sun Signature
                    </span>
                </button>

                <button type="button" class="quick-feature-card">
                    <span class="feature-badge">NEW</span>

                    <span class="feature-icon">
                        <i class="bx bx-wallet"></i>
                    </span>

                    <span class="feature-name">
                        Tự động<br>sinh lời
                    </span>
                </button>

                <button type="button" class="quick-feature-card">
                    <span class="feature-icon">
                        <i class="bx bx-briefcase-alt"></i>
                    </span>

                    <span class="feature-name">
                        Tiết kiệm
                    </span>
                </button>

                <button type="button" class="quick-feature-card">
                    <span class="feature-icon">
                        <i class="bx bx-cart"></i>
                    </span>

                    <span class="feature-name">
                        iziShop
                    </span>
                </button>

            </div>

            <button
                type="button"
                class="all-features-button"
            >
                <span>Tất cả tính năng</span>
                <i class="bx bx-right-arrow-alt"></i>
            </button>

        </section>


        <!-- Nút chuyển tiền và QR -->
        <section class="primary-actions">

            <button
                type="button"
                class="primary-action-button"
                id="transferButton"
            >
                <span class="primary-action-icon">
                    <i class="bx bx-transfer-alt"></i>
                </span>

                <span>Chuyển tiền</span>
            </button>

            <button
                type="button"
                class="primary-action-button"
                id="scanQrButton"
            >
                <span class="primary-action-icon">
                    <i class="bx bx-qr-scan"></i>
                </span>

                <span>Quét mã QR</span>
            </button>

        </section>


        <!-- Banner -->
        <section class="home-banner">

            <div class="banner-content">
                <p>
                    Thanh toán hóa đơn tự động, nhận
                    hoàn tiền tới <strong>150K</strong>
                </p>

                <button type="button" class="banner-button">
                    <span>Khám phá ngay</span>
                    <i class="bx bx-right-arrow-alt"></i>
                </button>
            </div>

            <div class="banner-visual" aria-hidden="true">
                <div class="banner-phone">
                    <i class="bx bx-receipt"></i>
                </div>

                <div class="banner-coin">
                    $
                </div>

                <div class="banner-card">
                    <i class="bx bx-wifi"></i>
                </div>
            </div>

        </section>


        <!-- Giao dịch -->
        <section class="transaction-section">
            <h2>Giao dịch</h2>

            <div class="transaction-empty">
                <i class="bx bx-receipt"></i>

                <p>Chưa có giao dịch gần đây</p>
            </div>
        </section>

    </div>


    <!-- Thanh điều hướng dưới -->
    <nav class="bottom-navigation">

        <button
            type="button"
            class="nav-item active"
        >
            <i class="bx bxs-home"></i>
            <span>Trang chủ</span>
        </button>

        <button
            type="button"
            class="nav-item"
        >
            <i class="bx bx-wallet"></i>
            <span>Tài khoản</span>
        </button>

        <button
            type="button"
            class="nav-item qr-nav-item"
            aria-label="Quét mã QR"
        >
            <span class="qr-nav-circle">
                <i class="bx bx-qr-scan"></i>
            </span>
        </button>

        <button
            type="button"
            class="nav-item"
        >
            <i class="bx bxs-credit-card"></i>
            <span>Dịch vụ thẻ</span>
        </button>

        <button
            type="button"
            class="nav-item"
        >
            <i class="bx bxs-cog"></i>
            <span>Cài đặt</span>
        </button>

    </nav>

</main>

<script src="./js/home.js"></script>
<script src="./js/pwa.js"></script>
</body>
</html>
