<!DOCTYPE html>
<html lang="vi">
<head>
   <meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
>

<meta name="theme-color" content="#d9f3ff">

<!-- Android / PWA -->
<link rel="manifest" href="./manifest.json">

<!-- iPhone / iPad -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
>
<meta name="apple-mobile-web-app-title" content="NCB Demo">

<link
    rel="apple-touch-icon"
    href="./img/app-icon.png"
>

    <link
        href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="./css/password.css">
</head>

<body>

<main class="password-page" id="passwordPage">

    <button
        type="button"
        class="back-button"
        id="backButton"
        aria-label="Quay lại"
    >
        <i class="bx bx-left-arrow-alt"></i>
    </button>

    <section class="password-content">

        <h1>
            Vui lòng nhập
            <span>mật khẩu</span>
        </h1>

        <div class="password-input-area">

            <input
                type="password"
                id="passwordInput"
                class="password-input"
                inputmode="numeric"
                maxlength="9"
                autocomplete="off"
                aria-label="Nhập mật khẩu"
            >

            <button
                type="button"
                class="show-password-button"
                id="showPasswordButton"
                aria-label="Hiện hoặc ẩn mật khẩu"
            >
                <i class="bx bx-hide"></i>
            </button>

        </div>

        <button
            type="button"
            class="forgot-password"
            id="forgotPasswordButton"
        >
            Cấp lại mật khẩu?
        </button>

    </section>

    <button
        type="button"
        class="continue-button"
        id="continueButton"
        disabled
    >
        Tiếp tục
    </button>

</main>

<script src="./js/password.js"></script>
<script src="./js/pwa.js"></script>
</body>
</html>
